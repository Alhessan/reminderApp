<ion-item [class.overdue]="taskItem.isOverdue" [class.missed]="taskItem.displayStatus === 'missed'" class="task-item" (click)="navigateToTaskDetail()" [button]="true" [routerDirection]="'forward'">
  <!-- Status Icon -->
  <div slot="start" class="status-indicator" [class]="'status-' + (taskItem.displayStatus || 'upcoming')">
    <ion-icon
      [name]="getStatusIcon(taskItem.displayStatus || 'upcoming')"
      (click)="onStatusClick($event)">
    </ion-icon>
  </div>

  <!-- Task Content -->
  <ion-label>
    <h2>{{ taskItem.task.title }}</h2>
    <p class="task-due">
      <ion-icon name="time-outline"></ion-icon>
      {{ formatDate(taskItem.nextDueDate) }}
    </p>
    <ion-note *ngIf="taskItem.lastMissedDate" class="last-missed">
      Last missed {{ taskItem.lastMissedDate | date:'shortDate' }}
    </ion-note>
  </ion-label>

  <!-- Right-side meta -->
  <div slot="end" class="task-end">
    <!-- Paused badge -->
    <ion-badge *ngIf="taskItem.task.state === 'paused'" color="medium" mode="ios" class="paused-badge">
      Paused
    </ion-badge>

    <!-- Status Badge -->
    <ion-badge [color]="getStatusColor(taskItem.displayStatus || 'upcoming')" mode="ios" class="status-badge">
      <app-cycle-status-badge [status]="taskItem.displayStatus || 'upcoming'"></app-cycle-status-badge>
    </ion-badge>

    <!-- Task Type Chip -->
    <ion-chip
      *ngIf="taskItem.task.type"
      [color]="getTypeColor(taskItem.task.type)"
      size="small"
      class="task-type">
      <ion-label>{{ taskItem.task.type }}</ion-label>
    </ion-chip>

    <!-- Quick complete -->
    <!-- <ion-button
      *ngIf="canQuickComplete"
      fill="clear"
      size="small"
      color="success"
      (click)="onQuickComplete($event)"
      class="quick-complete-btn">
      <ion-icon slot="icon-only" name="checkmark-circle-outline"></ion-icon>
    </ion-button> -->
  </div>

  <!-- Options Button -->
  <ion-button
    fill="clear"
    size="small"
    slot="end"
    (click)="onOptionsClick($event)"
    class="options-button">
    <ion-icon name="ellipsis-vertical" slot="icon-only"></ion-icon>
  </ion-button>
</ion-item>
